<div id="errors" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#300;color:#f88;font:12px monospace;padding:8px;max-height:50vh;overflow:auto;display:none;"></div>
<script>
const errDiv = document.getElementById('errors');
function showErr(msg) {
    errDiv.style.display = 'block';
    errDiv.textContent += msg + '\n';
}
window.onerror = function(msg, src, line, col, err) {
    showErr('ERROR: ' + msg + ' at ' + src + ':' + line + ':' + col + (err ? '\n' + err.stack : ''));
};
window.addEventListener('unhandledrejection', function(e) {
    showErr('PROMISE: ' + (e.reason ? (e.reason.stack || e.reason.message || e.reason) : e));
});
// Patch fetch to log failures
const origFetch = window.fetch;
window.fetch = function() {
    return origFetch.apply(this, arguments).then(r => {
        if (!r.ok) showErr('FETCH FAIL: ' + r.status + ' ' + arguments[0]);
        return r;
    }).catch(e => {
        showErr('FETCH ERR: ' + arguments[0] + ' ' + e.message);
        throw e;
    });
};
</script>
<!-- Now load everything from index.html -->

<script>
window.onload = async function() {
    try {
        showErr('Starting Controller...');
        const c = new Controller({ containerElementSelector: '.pyswitch-emulator' });
        showErr('Controller created, calling run()...');
        await c.run();
        showErr('run() completed');
    } catch(e) {
        showErr('FATAL: ' + e.message + '\n' + e.stack);
    }
};
