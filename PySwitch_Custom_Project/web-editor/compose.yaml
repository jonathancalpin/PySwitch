services:
  pyswitch-custom-ui:
    build: .
    container_name: apache-pyswitch-custom-ui
    ports:
      - "8080:80"
    volumes:
      - ./htdocs:/var/www/html
      - ../../content:/var/www/html/circuitpy
      - ../../examples:/var/www/html/examples
      - ../deploy:/var/www/html/custom-deploy
      
      - ./apache2-conf:/etc/apache2/sites-available
      - ./apache2-log:/var/log/apache2
